name: InternTrack AI CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ==========================================
  # JOB 1: Lint & Type Check
  # ==========================================
  lint:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: TypeScript Compilation Check
        run: npm run lint

  # ==========================================
  # JOB 2: Integration Tests
  # ==========================================
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      JWT_SECRET: ci_cd_test_secret_key_for_testing_purposes_only
      DATABASE_URL: postgresql://postgres:password@localhost:5432/interntrack?schema=public
      NODE_ENV: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run Integration Tests
        run: npm run test

  # ==========================================
  # JOB 3: Production Build
  # ==========================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test

    env:
      JWT_SECRET: ci_cd_build_secret_key_for_building_purposes_only
      DATABASE_URL: postgresql://postgres:password@localhost:5432/interntrack?schema=public
      NODE_ENV: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build Frontend (Vite)
        run: npx vite build

      - name: Bundle Server (esbuild ESM)
        run: npx esbuild server.ts --bundle --platform=node --format=esm --packages=external --sourcemap --outfile=dist/server.js

      - name: Verify Build Artifacts Exist
        run: |
          ls -lh dist/
          test -f dist/index.html && echo "✅ Frontend build: OK"
          test -f dist/server.js  && echo "✅ Server bundle: OK"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7
